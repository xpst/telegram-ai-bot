
server.port=8191
spring.application.name=telegram-ai-bot

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-5-nano

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite-preview

logging.level.org.springframework.ai.chat.client.advisor=DEBUG

pro.xpst.openai.models=gpt-5,gpt-4o-mini,gpt-5-mini,gpt-5-nano,o4-mini
pro.xpst.gemini.models=gemini-3.1-flash-lite-preview

# Default provider for new chats: openai or gemini
pro.xpst.default.provider=gemini

# Telegram bot name and token for the bot
pro.xpst.telegram.bot.username=${BOT_NAME}
pro.xpst.telegram.bot.token=${BOT_TOKEN}

# comma separated list of allowed users, all users are allowed is empty
pro.xpst.telegram.bot.users.allowed=

# Conversation history expiration time in minutes (default: 60 minutes = 1 hour)
pro.xpst.openai.conversation.expiration=2
